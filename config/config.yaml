concurrent: 80
check-interval: 120
timeout: 5000
min-speed: 1024
download-timeout: 10
speed-test-url: https://github.com/2dust/v2rayN/releases/download/7.10.4/v2rayN-windows-64-desktop.zip
save-method: local
github-gist-id: ''
github-token: ''
github-api-mirror: ''
worker-url: https://example.worker.dev
worker-token: 1234567890
webdav-username: admin
webdav-password: admin
webdav-url: https://example.com/dav/
enable-web-ui: true
listen-port: 127.0.0.1:8199
old-api-key: admin
api-key: ef6be9d3f1d7f2cf19f1e7ae89c0d67f
sub-store-port: :8299
githubproxy: gh-proxy.com
github-proxy: https://gh-proxy.com/
sub-urls:
  - http://127.0.0.1:8199/all.yaml
  - https://raw.githubusercontent.com/ebrasha/free-v2ray-public-list/refs/heads/main/V2Ray-Config-By-EbraSha-All-Type.txt
  - https://raw.githubusercontent.com/ebrasha/free-v2ray-public-list/refs/heads/main/V2Ray-Config-By-EbraSha.txt
  - https://raw.githubusercontent.com/MatinGhanbari/v2ray-configs/main/subscriptions/v2ray/all_sub.txt
  - https://raw.githubusercontent.com/MatinGhanbari/v2ray-configs/main/subscriptions/v2ray/super-sub.txt
  - https://raw.githubusercontent.com/barry-far/V2ray-config/main/All_Configs_Sub.txt
  - https://raw.githubusercontent.com/barry-far/V2ray-config/main/All_Configs_base64_Sub.txt
  - https://raw.githubusercontent.com/anaer/Sub/main/clash.yaml
  - https://raw.githubusercontent.com/Delta-Kronecker/V2ray-Config/main/sub.txt
  - https://raw.githubusercontent.com/Epodonios/v2ray-configs/main/All_Configs_Sub.txt
  - https://sub.azadnetch.workers.dev/AzadNetCH/Clash/main/AzadNet.txt
  - https://raw.githubusercontent.com/mfuu/v2ray/master/clash.yaml
  - https://raw.githubusercontent.com/Pawdroid/Free-servers/main/sub
mihomo-overwrite-url: http://127.0.0.1:8199/bdg.yaml
rename-node: true
media-check: true
keep-success-proxies: false
print-progress: false
sub-urls-retry: 3
subscheck-version: v1.4.0
gui-auto: false
success-limit: 1000

# 节点前缀，依赖rename-node为true才生效
node-prefix: "@github tonygyf"

# 填写搭建的apprise API server 地址
# https://notify.xxxx.us.kg/notify
apprise-api-server: ""
# 填写通知目标
# 支持100+ 个通知渠道，详细格式请参照 https://github.com/caronc/apprise
recipient-url: 
  # telegram格式：tgram://<bot_token>/<chat_id>
  # - tgram://xxxxxx/-1002149239223
  # 钉钉格式：dingtalk://<secret>@<dd_token>/<chat_id>
  # - dingtalk://xxxxxx@xxxxxxx/123123
# 自定义通知标题
notify-title: "🔔 节点状态更新"